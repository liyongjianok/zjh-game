# docker-compose.yml
services:
  etcd:
    # 切换为 Quay 官方源，避开国内针对 Docker Hub bitnami 命名空间的 403 拦截
    image: quay.io/coreos/etcd:v3.5.9
    container_name: zjh-etcd
    ports:
      - "23790:2379"
      - "23800:2380"
    # CoreOS 镜像需要通过命令行参数启动单节点集群
    command:
      - /usr/local/bin/etcd
      - --name=zjh-node-1
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=zjh-node-1=http://0.0.0.0:2380
      - --initial-cluster-token=zjh-etcd-token
      - --initial-cluster-state=new

  redis:
    image: redis:7.0-alpine
    container_name: zjh-redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]

  mysql:
    image: mysql:8.0
    container_name: zjh-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=zjh_root_secret
      - MYSQL_DATABASE=zjh_core
    volumes:
      - ./deploy/sql:/docker-entrypoint-initdb.d # 挂载初始化SQL

networks:
  default:
    name: zjh-network
